<div class="container bordered">
  <h2>Editeaza Transport</h2>
</div>
@if (model) {
  <app-transport-item
    [selectedProdus]="selectedProdus"
    [depoziteLista]="depoziteLista"
    [model]="model"
  (onSaveChanges)="saveChanges($event)"></app-transport-item>
}
<app-display-errors [errors]="errors"></app-display-errors>
