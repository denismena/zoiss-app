<div class="zoiss-auth-page">
  <div class="zoiss-hero-wrap">
    <section class="zoiss-hero" aria-labelledby="zoiss-forget-title">
      <div class="zoiss-hero-pattern" aria-hidden="true"></div>
      <div class="zoiss-hero-inner">
        <h1 id="zoiss-forget-title">Reseteaza parola</h1>
      </div>
    </section>

    <div class="zoiss-sheet-wrap">
      <mat-card class="cardWithShadow zoiss-sheet">
        <mat-card-content class="p-24 zoiss-card-inner">
          <form (submit)="confirm(form.value)" [formGroup]="form">
            <mat-form-field appearance="outline">
              <mat-label>Email</mat-label>
              <input formControlName="email" matInput>
              <mat-error>{{form.get("email")?.getError("required")?.message}}</mat-error>
              <mat-error>{{form.get("email")?.getError("email")?.message}}</mat-error>
            </mat-form-field>

            <div class="zoiss-actions">
              <button mat-flat-button color="primary" [disabled]="form.invalid">Confirma</button>
            </div>
          </form>

          <app-display-errors [errors]="errors"></app-display-errors>

          @if (success) {
            <div class="zoiss-success">
              Un email pe adresa dumneavoastra a fost trimis. Urmati pasii din email pentru a continua procesul de resetare a parolei.
            </div>
          }

          <p class="zoiss-auth-link-row">
            <a [routerLink]="['/login']" class="zoiss-link">Inapoi la autentificare</a>
          </p>
        </mat-card-content>
      </mat-card>
    </div>
  </div>
</div>
