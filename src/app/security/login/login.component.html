<div class="zoiss-auth-page">
  <div class="zoiss-hero-wrap">
    <section class="zoiss-hero" aria-labelledby="zoiss-login-title">
      <div class="zoiss-hero-pattern" aria-hidden="true"></div>
      <div class="zoiss-hero-inner">
        <h1 id="zoiss-login-title">Autentificare</h1>
      </div>
    </section>

    <div class="zoiss-sheet-wrap">
      <mat-card class="cardWithShadow zoiss-sheet">
        <mat-card-content class="p-24 zoiss-card-inner">
          <app-authentication-form (onSaveChanges)="login($event)" [action]="'Autentificare'"></app-authentication-form>

          <p class="zoiss-register">
            Utilizator nou?
            <a [routerLink]="['/register']" class="zoiss-link">Inregistreaza-te</a>
          </p>

          <div class="zoiss-scan">
            <div class="zoiss-scan-row">
              <span class="zoiss-scan-title">Scaneaza produs</span>
              <div class="zoiss-scan-actions">
                <button
                  type="button"
                  class="zoiss-icon-btn zoiss-icon-btn--on"
                  (click)="scannerEnabled = true"
                  aria-label="Porneste scanner"
                >
                  <mat-icon>camera_alt</mat-icon>
                </button>
                <button
                  type="button"
                  class="zoiss-icon-btn zoiss-icon-btn--off"
                  (click)="scannerEnabled = false"
                  aria-label="Opreste scanner"
                >
                  <mat-icon>stop</mat-icon>
                </button>
              </div>
            </div>
            @if (scannerEnabled) {
              <div class="zoiss-scan-embed">
                <app-scan-qr></app-scan-qr>
              </div>
            }
          </div>
        </mat-card-content>
        <app-display-errors [errors]="errors"></app-display-errors>
      </mat-card>
    </div>
  </div>
</div>
