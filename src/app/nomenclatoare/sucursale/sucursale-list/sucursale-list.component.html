<div class="container">
  <mat-accordion>
    <mat-expansion-panel hideToggle class="mat-elevation-z0">
      <mat-expansion-panel-header>
        <mat-panel-description (click)="$event.stopPropagation();">
          <h2 class="list-toolbar">
            <span class="list-toolbar-title">Lista Sucursale</span>
            <span class="list-toolbar-actions">
              <button type="button" routerLink="/sucursale/create" mat-flat-button color="primary">
                <img src="assets/img/icons/material-design-icons/two-tone/add_circle.svg" alt="Adauga" height="30" width="30">
              </button>
            </span>
          </h2>
        </mat-panel-description>
      </mat-expansion-panel-header>
    </mat-expansion-panel>
  </mat-accordion>

  <app-display-errors [errors]="errors"></app-display-errors>

  @let sucursala = sucursala$ | async;
  <app-generic-list [list]="sucursala">
    <ng-container content>
      @if (sucursala && sucursala.length > 0) {
        <table mat-table [dataSource]="sucursala" class="table-index">
          <ng-container matColumnDef="nume">
            <th mat-header-cell *matHeaderCellDef>Nume</th>
            <td mat-cell *matCellDef="let element">
              {{element.nume}}
            </td>
          </ng-container>
          <ng-container matColumnDef="action">
            <th mat-header-cell *matHeaderCellDef>#</th>
            <td mat-cell *matCellDef="let element">
              <a routerLink="/sucursale/edit/{{element.id}}" title="Edit">
                <mat-icon color="primary">edit</mat-icon>
              </a>
              <mat-icon mat-list-icon [ngStyle]="{'color':'red', 'cursor': 'pointer'}" (click)="delete(element.id)" title="Delete">close</mat-icon>
            </td>
          </ng-container>
          <tr mat-header-row *matHeaderRowDef="columnsToDisplay"></tr>
          <tr mat-row *matRowDef="let row; columns: columnsToDisplay"></tr>
        </table>
      }
    </ng-container>
  </app-generic-list>
</div>
