<form class="example-form">
  <mat-label>Utilizator</mat-label>
  <mat-form-field class="example-full-width" appearance="fill">
    <input matInput
      aria-label="Utilizator"
      [matAutocomplete]="autoUtilizator"
      [formControl]="utilizatorCtrl">
      <mat-autocomplete #autoUtilizator="matAutocomplete" (optionSelected)="optionSelected($event)" [displayWith]="displayFn">
        @for (utilizator of (selectedUtilizator | async) ?? []; track utilizator) {
          <mat-option [value]="utilizator">
            {{utilizator.name}}
          </mat-option>
        }
      </mat-autocomplete>
    </mat-form-field>
  </form>
