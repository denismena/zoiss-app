<div class="container bordered">
  <h2>Modifica oferta</h2>
</div>
@if (model) {
  <app-oferte-item
    [selectedProdus] = "selectedProdus"
    [preselectClient] = "preselectClient"
    [preselectArhitect] = "preselectArhitect"
  [model]="model" (onSaveChanges)="saveChanges($event)" (onClone)="cloneOferta()"></app-oferte-item>
}
<app-display-errors [errors]="errors"></app-display-errors>
